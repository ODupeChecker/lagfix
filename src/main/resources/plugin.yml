name: LagFix
version: 1.0.0
main: com.example.lagfix.LagFixPlugin
api-version: '1.20'
depend: [ProtocolLib]
softdepend: [PlaceholderAPI]
description: Blocks WINDOW_CLICK packet floods and manages a boss spawn timer.
commands:
  bosstimer:
    description: Manage the boss spawn timer.
    usage: /bosstimer set <1h/2h/1.5h/3h> | /bosstimer spawn
